<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#06b6d4" flood-opacity="0.3"/>
    </filter>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#06b6d4" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#06b6d4" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="400"/><line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/><line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/><line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/><line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/><line x1="440" y1="0" x2="440" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="520" y1="0" x2="520" y2="400"/>
    <line x1="560" y1="0" x2="560" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/><line x1="680" y1="0" x2="680" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/><line x1="760" y1="0" x2="760" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/><line x1="840" y1="0" x2="840" y2="400"/>
    <line x1="880" y1="0" x2="880" y2="400"/><line x1="920" y1="0" x2="920" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/><line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1040" y1="0" x2="1040" y2="400"/><line x1="1080" y1="0" x2="1080" y2="400"/>
    <line x1="1120" y1="0" x2="1120" y2="400"/><line x1="1160" y1="0" x2="1160" y2="400"/>
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
  </g>

  <!-- Ghost icon (USB stick shape with ghost face) -->
  <g transform="translate(160, 80)" filter="url(#shadow)">
    <!-- USB stick body -->
    <rect x="0" y="40" width="120" height="180" rx="12" fill="#1e293b" stroke="url(#glow)" stroke-width="2"/>
    <!-- USB connector -->
    <rect x="20" y="0" width="80" height="50" rx="4" fill="#334155" stroke="#475569" stroke-width="1.5"/>
    <rect x="35" y="8" width="20" height="30" rx="2" fill="#0f172a"/>
    <rect x="65" y="8" width="20" height="30" rx="2" fill="#0f172a"/>
    <!-- Ghost face on the stick -->
    <circle cx="42" cy="120" r="10" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.9"/>
    <circle cx="78" cy="120" r="10" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.9"/>
    <circle cx="42" cy="118" r="4" fill="#06b6d4" opacity="0.7"/>
    <circle cx="78" cy="118" r="4" fill="#06b6d4" opacity="0.7"/>
    <!-- Ghost mouth -->
    <ellipse cx="60" cy="155" rx="14" ry="10" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.6"/>
    <!-- LED indicator -->
    <circle cx="60" cy="195" r="5" fill="#22d3ee" opacity="0.8">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Wavy ghost bottom -->
    <path d="M0 220 Q15 235 30 220 Q45 205 60 220 Q75 235 90 220 Q105 205 120 220"
          fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Main title -->
  <text x="380" y="145" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="url(#textGrad)" filter="url(#textShadow)" letter-spacing="-1">
    GHOST<tspan fill="#f8fafc">DRIVE</tspan>
  </text>

  <!-- Tagline -->
  <text x="385" y="190" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#94a3b8" letter-spacing="6" font-weight="300">
    OWN YOUR INTELLIGENCE
  </text>

  <!-- Divider line -->
  <line x1="385" y1="210" x2="780" y2="210" stroke="url(#glow)" stroke-width="1" opacity="0.3"/>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14">
    <!-- Pill 1: Offline -->
    <rect x="385" y="230" width="130" height="32" rx="16" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
    <circle cx="403" cy="246" r="4" fill="#22d3ee"/>
    <text x="415" y="251" fill="#94a3b8" font-weight="500">No Internet</text>

    <!-- Pill 2: Private -->
    <rect x="530" y="230" width="140" height="32" rx="16" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
    <circle cx="548" cy="246" r="4" fill="#22d3ee"/>
    <text x="560" y="251" fill="#94a3b8" font-weight="500">100% Private</text>

    <!-- Pill 3: Free -->
    <rect x="685" y="230" width="150" height="32" rx="16" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
    <circle cx="703" cy="246" r="4" fill="#22d3ee"/>
    <text x="715" y="251" fill="#94a3b8" font-weight="500">Free &amp; Open</text>
  </g>

  <!-- Scam callout -->
  <g transform="translate(385, 285)">
    <rect width="460" height="44" rx="8" fill="#7f1d1d" fill-opacity="0.3" stroke="#dc2626" stroke-width="1" stroke-opacity="0.4"/>
    <text x="20" y="28" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#fca5a5" font-weight="600">
      They charge $129.  This repo is free.  You're welcome.
    </text>
  </g>

  <!-- Version badge -->
  <g transform="translate(1080, 20)">
    <rect width="80" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="40" y="19" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748b" text-anchor="middle" font-weight="500">v1.3</text>
  </g>
</svg>
